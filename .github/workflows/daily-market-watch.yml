name: Daily Market Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"
      timezone: "Asia/Shanghai"

permissions:
  contents: read

concurrency:
  group: daily-market-watch
  cancel-in-progress: false

jobs:
  sync-to-notion:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
      NOTION_DATA_SOURCE_ID: collection://a1f37ba1-0e98-457e-82f1-db47ec20ab17
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Notion secret
        run: |
          if [ -z "${NOTION_API_TOKEN}" ]; then
            echo "Missing GitHub Actions secret: NOTION_API_TOKEN" >&2
            exit 1
          fi

      - name: Create runtime delivery config
        run: |
          mkdir -p config
          cat > config/delivery.json <<EOF
          {
            "deliveries": [
              {
                "id": "notion-market-watch",
                "type": "notion_database",
                "enabled": true,
                "auth_token_env": "NOTION_API_TOKEN",
                "data_source_id": "${NOTION_DATA_SOURCE_ID}",
                "upsert": true,
                "default_review_status": "To Review",
                "relation_targets": [
                  {
                    "property_key": "company_record",
                    "data_source_id": "collection://8a47f584-7a5b-4cba-9eb6-d6d6ca8789cc",
                    "lookup_properties": ["Company"],
                    "signal_fields": ["company_name"]
                  },
                  {
                    "property_key": "ai_tracker_deal",
                    "data_source_id": "collection://b7f972e1-ad2d-46e6-8b13-f298e99a3602",
                    "lookup_properties": ["Company", "Deal"],
                    "signal_fields": ["company_name", "title"]
                  },
                  {
                    "property_key": "pipeline_deal",
                    "data_source_id": "collection://0b6c5021-4235-4b5d-b8bb-3f50da0c277b",
                    "lookup_properties": ["项目名称"],
                    "signal_fields": ["company_name", "title"]
                  }
                ]
              }
            ]
          }
          EOF

      - name: Run regression tests
        run: python -m unittest discover -s tests -v

      - name: Sync daily report to Notion
        run: python -m market_intel_watch daily --config-dir config --output-dir output
